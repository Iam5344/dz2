<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const car = {
            manufacturer: "Toyota",
            model: "Camry",
            year: 2021,
            avgSpeed: 90
        };

        function showCarInfo(carObj) {
            alert(`Автомобіль:\nВиробник: ${carObj.manufacturer}\nМодель: ${carObj.model}\nРік випуску: ${carObj.year}\nСередня швидкість: ${carObj.avgSpeed} км/год`);
        }

        function calculateTravelTime(carObj, distance) {
            let pureHours = distance / carObj.avgSpeed;
            let breaks = Math.floor(pureHours / 4);
            
            if (pureHours % 4 === 0 && breaks > 0) {
                breaks--; 
            }
            
            return pureHours + breaks;
        }

        showCarInfo(car);
        let dist = parseFloat(prompt("Введіть відстань для подорожі в км:"));
        let totalTime = calculateTravelTime(car, dist);
        alert(`Для подолання ${dist} км знадобиться ${totalTime.toFixed(2)} год. (враховуючи перерви)`);



        const fraction1 = { numerator: 1, denominator: 2 };
        const fraction2 = { numerator: 1, denominator: 3 }; 

        function findGCD(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b !== 0) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        function reduceFraction(frac) {
            let gcd = findGCD(frac.numerator, frac.denominator);
            return {
                numerator: frac.numerator / gcd,
                denominator: frac.denominator / gcd
            };
        }

        function addFractions(f1, f2) {
            let result = {
                numerator: f1.numerator * f2.denominator + f2.numerator * f1.denominator,
                denominator: f1.denominator * f2.denominator
            };
            return reduceFraction(result);
        }

        function subtractFractions(f1, f2) {
            let result = {
                numerator: f1.numerator * f2.denominator - f2.numerator * f1.denominator,
                denominator: f1.denominator * f2.denominator
            };
            return reduceFraction(result);
        }

        function multiplyFractions(f1, f2) {
            let result = {
                numerator: f1.numerator * f2.numerator,
                denominator: f1.denominator * f2.denominator
            };
            return reduceFraction(result);
        }

        function divideFractions(f1, f2) {
            let result = {
                numerator: f1.numerator * f2.denominator,
                denominator: f1.denominator * f2.numerator
            };
            return reduceFraction(result);
        }

        let sumRes = addFractions(fraction1, fraction2);
        let subRes = subtractFractions(fraction1, fraction2);
        let mulRes = multiplyFractions(fraction1, fraction2);
        let divRes = divideFractions(fraction1, fraction2);

        alert(`Результати операцій з дробами 1/2 та 1/3 виведено в консоль (F12)`);
        
        console.log("Додавання:", sumRes.numerator + "/" + sumRes.denominator);
        console.log("Віднімання:", subRes.numerator + "/" + subRes.denominator);
        console.log("Множення:", mulRes.numerator + "/" + mulRes.denominator);
        console.log("Ділення:", divRes.numerator + "/" + divRes.denominator);
    </script>
</body>
</html>
