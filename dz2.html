<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
class Button {
    constructor(width, height, text) {
        this.width = width;
        this.height = height;
        this.text = text;
    }

    showBtn() {
        document.write(`<button>${this.text}</button>`);
    }
}

class BootstrapButton extends Button {
    constructor(width, height, text, color) {
        super(width, height, text);
        this.color = color;
    }

    showBtn() {
        document.write(`<button style="width: ${this.width}; height: ${this.height}; background-color: ${this.color}; border: none; border-radius: 4px; color: white; cursor: pointer;">${this.text}</button>`);
    }
}

const plainButton = new Button("100px", "40px", "Plain");
plainButton.showBtn();

const bootstrapBtn = new BootstrapButton("150px", "45px", "Bootstrap Success", "green");
bootstrapBtn.showBtn();


class Shape {
    constructor(name) {
        this._name = name;
    }

    get name() {
        return this._name;
    }

    printInfo() {
        document.write(`<p>Фігура: ${this.name}</p>`);
    }

    getArea() {
        return 0;
    }

    getPerimeter() {
        return 0;
    }
}

class Square extends Shape {
    constructor(side) {
        super("Квадрат");
        this.side = side;
    }

    printInfo() {
        document.write(`<p>Фігура: ${this.name}, Сторона: ${this.side}</p>`);
    }

    getArea() {
        return this.side ** 2;
    }

    getPerimeter() {
        return this.side * 4;
    }
}

class Rectangle extends Shape {
    constructor(width, height) {
        super("Прямокутник");
        this.width = width;
        this.height = height;
    }

    printInfo() {
        document.write(`<p>Фігура: ${this.name}, Сторони: ${this.width}, ${this.height}</p>`);
    }

    getArea() {
        return this.width * this.height;
    }

    getPerimeter() {
        return (this.width + this.height) * 2;
    }
}

class Triangle extends Shape {
    constructor(a, b, c) {
        super("Трикутник");
        this.a = a;
        this.b = b;
        this.c = c;
    }

    printInfo() {
        document.write(`<p>Фігура: ${this.name}, Сторони: ${this.a}, ${this.b}, ${this.c}</p>`);
    }

    getArea() {
        const p = this.getPerimeter() / 2;
        return Math.sqrt(p * (p - this.a) * (p - this.b) * (p - this.c));
    }

    getPerimeter() {
        return this.a + this.b + this.c;
    }
}

const shapes = [
    new Square(5),
    new Rectangle(4, 8),
    new Triangle(3, 4, 5)
];

for (let shape of shapes) {
    shape.printInfo();
    document.write(`<p>Площа: ${shape.getArea().toFixed(2)}</p>`);
    document.write(`<p>Периметр: ${shape.getPerimeter().toFixed(2)}</p>`);
    document.write("<hr>");
}
    </script>
</body>
</html>
